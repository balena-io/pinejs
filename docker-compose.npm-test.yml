version: "2.1"
services:
  postgres:
    image: postgres:17-alpine@sha256:979c4379dd698aba0b890599a6104e082035f98ef31d9b9291ec22f2b13059ca
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: postgres
      TZ: UTC
    ports:
      - "5431:5432"
    command:
      - -c
      - synchronous_commit=off
      - -c
      - fsync=off
      - -c
      - full_page_writes=off
  minio-server:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    environment:
      MINIO_ROOT_USER: USERNAME
      MINIO_ROOT_PASSWORD: PASSWORD
    command: server /data --console-address ":9001"
    ports:
      - "43680:9000"
      - "43697:9001"
  minio-client:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      - minio-server
    entrypoint: >
      /bin/sh -c "
      set -e;
      sleep 1;
      /usr/bin/mc alias set minio-server http://minio-server:9000 USERNAME PASSWORD;
      /usr/bin/mc mb --ignore-existing minio-server/balena-pine-web-resources;
      sleep infinity;
      "
